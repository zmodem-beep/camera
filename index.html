<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快遞貨物拍照紀錄 (Android 修正版)</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --danger-color: #FF3B30;
            --bg-color: #F2F2F7;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 22px; }
        .header p { margin: 5px 0 0; font-size: 13px; color: #8E8E93; }

        .input-group {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #C7C7CC;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-clear { background-color: #8E8E93; color: white; }
        .btn-main { background-color: var(--primary-color); color: white; width: 100%; padding: 18px; }

        /* 相機層核心修正 */
        #camera-layer {
            display: none;
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }

        #video {
            width: 100%;
            height: 75vh; /* 限制影片高度只佔 75%，保留下方空間 */
            object-fit: contain;
            background: #000;
        }

        .camera-controls {
            width: 100%;
            height: 25vh; /* 強制按鈕區佔 25% */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1C1C1E;
            position: relative;
        }

        .shutter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid #FFF;
            background: var(--danger-color);
            display: block;
            cursor: pointer;
            z-index: 10001; /* 確保在最上層 */
        }

        .history-section { width: 100%; margin-top: 20px; }
        .thumb-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .thumb-item { background: white; padding: 5px; border-radius: 8px; text-align: center; font-size: 11px; }
        .thumb-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>快遞貨物拍照紀錄</h1>
        <p>快遞機放組邱垂霖製作</p>
    </div>

    <div class="input-group">
        <input type="text" id="cargoId" placeholder="輸入貨物編號">
        <button class="btn btn-clear" onclick="clearInput()">清除</button>
    </div>

    <button class="btn btn-main" onclick="startCamera()">開始拍照</button>

    <div class="history-section">
        <div class="thumb-container" id="thumb-list"></div>
    </div>

    <div id="camera-layer">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <div class="shutter-btn" onclick="takePhoto()" id="shutter"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        let stream = null;
        let photoHistory = JSON.parse(localStorage.getItem('photoHistory') || '[]');
        let serialMap = JSON.parse(localStorage.getItem('serialMap') || '{}');

        function updateThumbs() {
            const container = document.getElementById('thumb-list');
            container.innerHTML = '';
            photoHistory.slice(-3).reverse().forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'thumb-item';
                div.innerHTML = `<img src="${item.data}"><span>${item.name}</span>`;
                container.appendChild(div);
            });
            localStorage.setItem('photoHistory', JSON.stringify(photoHistory));
            localStorage.setItem('serialMap', JSON.stringify(serialMap));
        }

        async function startCamera() {
            const cargoId = document.getElementById('cargoId').value.trim();
            if (!cargoId) { alert('請先輸入貨物編號'); return; }

            try {
                // Android 高清請求
                const constraints = {
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('video').srcObject = stream;
                document.getElementById('camera-layer').style.display = 'flex';
            } catch (e) {
                alert('開啟相機失敗：' + e.name);
            }
        }

        function takePhoto() {
            const cargoId = document.getElementById('cargoId').value.trim();
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            if (!serialMap[cargoId]) serialMap[cargoId] = 0;
            serialMap[cargoId]++;
            const fileName = `${cargoId}-${serialMap[cargoId]}.jpg`;

            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            photoHistory.push({ name: fileName, data: dataUrl });
            updateThumbs();

            setTimeout(() => {
                if (!confirm(`已存：${fileName}\n繼續拍這件？`)) {
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    document.getElementById('camera-layer').style.display = 'none';
                }
            }, 300);
        }

        function clearInput() { document.getElementById('cargoId').value = ''; }
        updateThumbs();
    </script>
</body>
</html>
