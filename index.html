<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快遞貨物拍照紀錄 (HD版)</title>
    <style>
        :root { --primary-color: #007AFF; --danger-color: #FF3B30; --bg-color: #F2F2F7; }
        body { font-family: -apple-system, system-ui; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 22px; color: #1C1C1E; }
        .header p { margin: 2px 0 0; font-size: 13px; color: #8E8E93; }
        .input-group { width: 100%; display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #C7C7CC; border-radius: 10px; font-size: 16px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-clear { background-color: #C7C7CC; color: white; }
        .btn-main { background-color: var(--primary-color); color: white; width: 100%; padding: 18px; font-size: 18px; }
        #camera-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; flex-direction: column; }
        video { width: 100%; flex-grow: 1; object-fit: contain; }
        .camera-controls { padding: 25px; display: flex; justify-content: center; background: rgba(0,0,0,0.9); }
        .shutter-btn { width: 70px; height: 70px; border-radius: 50%; border: 5px solid white; background: var(--danger-color); }
        .history-section { width: 100%; margin-top: 20px; }
        .thumb-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .thumb-item { background: white; padding: 4px; border-radius: 8px; text-align: center; }
        .thumb-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }
        .thumb-item span { font-size: 10px; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>快遞貨物拍照紀錄</h1>
        <p>快遞機放組邱垂霖製作</p>
    </div>

    <div class="input-group">
        <input type="text" id="cargoId" placeholder="輸入貨物編號" maxlength="25">
        <button class="btn btn-clear" onclick="clearInput()">清除</button>
    </div>

    <button class="btn btn-main" onclick="startCamera()">開始拍照</button>

    <div class="history-section">
        <div id="thumb-list" class="thumb-container"></div>
    </div>

    <div id="camera-layer">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <div class="shutter-btn" onclick="takePhoto()"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        let stream = null;
        let photoHistory = JSON.parse(localStorage.getItem('photoHistory') || '[]');
        let serialMap = JSON.parse(localStorage.getItem('serialMap') || '{}');

        function updateThumbs() {
            const container = document.getElementById('thumb-list');
            container.innerHTML = '';
            const lastThree = photoHistory.slice(-3).reverse();
            lastThree.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'thumb-item';
                div.innerHTML = `<img src="${item.data}"><span>${item.name}</span>`;
                let timer;
                div.addEventListener('touchstart', () => {
                    timer = setTimeout(() => { if(confirm('刪除這張照片？')) deletePhoto(photoHistory.length - 1 - index); }, 800);
                });
                div.addEventListener('touchend', () => clearTimeout(timer));
                container.appendChild(div);
            });
            localStorage.setItem('photoHistory', JSON.stringify(photoHistory));
            localStorage.setItem('serialMap', JSON.stringify(serialMap));
        }

        async function startCamera() {
            const cargoId = document.getElementById('cargoId').value.trim();
            if (!cargoId) { alert('請輸入貨物編號'); return; }

            const constraints = {
                video: {
                    facingMode: "environment",
                    width: { ideal: 4096 }, // 請求 4K 寬度
                    height: { ideal: 2160 } // 請求 4K 高度
                }
            };

            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = stream;
                document.getElementById('camera-layer').style.display = 'flex';
            } catch (e) {
                alert('無法啟動高清相機，嘗試基本模式');
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('camera-layer').style.display = 'flex';
            }
        }

        function takePhoto() {
            const cargoId = document.getElementById('cargoId').value.trim();
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            // 關鍵修改：使用 videoVideoWidth 獲取鏡頭原始輸出解析度
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            if (!serialMap[cargoId]) serialMap[cargoId] = 0;
            serialMap[cargoId]++;
            const fileName = `${cargoId}-${serialMap[cargoId]}.jpg`;

            // 設定最高品質 (1.0)
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            
            const link = document.createElement('a');
            link.download = fileName;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            photoHistory.push({ name: fileName, data: dataUrl });
            updateThumbs();

            setTimeout(() => {
                if (!confirm(`已存：${fileName}\n繼續拍這件嗎？`)) {
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    document.getElementById('camera-layer').style.display = 'none';
                }
            }, 300);
        }

        function clearInput() { document.getElementById('cargoId').value = ''; }
        function deletePhoto(idx) { photoHistory.splice(idx, 1); updateThumbs(); }
        updateThumbs();
    </script>
</body>
</html>
